# ═══════════════════════════════════════════════════════════
# Nginx Configuration — SmartTravel Qingyuan
# Security-hardened reverse proxy for Next.js standalone
# ═══════════════════════════════════════════════════════════

# Rate limiting zones (防暴力攻击/CC攻击)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=page_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=3r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name 124.156.142.149;

    # ── Security Headers ────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Hide server info ────────────────────────────────
    server_tokens off;
    proxy_hide_header X-Powered-By;

    # ── Connection limits ───────────────────────────────
    limit_conn conn_limit 50;

    # ── Request size limits ─────────────────────────────
    client_max_body_size 10M;
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 30s;

    # ── Gzip compression ───────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript
        application/xml application/xml+rss
        image/svg+xml;

    # ── Block common attack paths ──────────────────────
    location ~ /\.(git|env|htaccess|htpasswd|svn|DS_Store) {
        deny all;
        return 404;
    }

    location ~* (wp-admin|wp-login|xmlrpc|phpmyadmin|\.php$) {
        deny all;
        return 404;
    }

    # ── Block bad user agents (scanners/bots) ──────────
    if ($http_user_agent ~* (scrapy|curl|HttpClient|python-requests|Nikto|sqlmap|nmap|masscan)) {
        return 403;
    }

    # ── Static assets (Next.js _next/static) ───────────
    location /_next/static/ {
        alias /opt/smarttravel/.next/static/;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ── Public files (favicon, images, etc.) ───────────
    location /public/ {
        alias /opt/smarttravel/public/;
        expires 30d;
        access_log off;
    }

    location /favicon.ico {
        alias /opt/smarttravel/public/favicon.ico;
        expires 30d;
        access_log off;
    }

    # ── API rate limiting ──────────────────────────────
    location /api/auth/ {
        limit_req zone=login_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Main application ───────────────────────────────
    location / {
        limit_req zone=page_limit burst=50 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 16k;
        proxy_read_timeout 60s;
    }

    # ── Custom error pages ─────────────────────────────
    error_page 429 /429.html;
    location = /429.html {
        default_type text/html;
        return 429 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>请求过于频繁</title></head><body style="text-align:center;padding:50px;font-family:sans-serif"><h1>429 - 请求过于频繁</h1><p>请稍后再试 / Too Many Requests</p></body></html>';
    }

    # ── Access log with security info ──────────────────
    access_log /var/log/nginx/smarttravel_access.log;
    error_log /var/log/nginx/smarttravel_error.log warn;
}
