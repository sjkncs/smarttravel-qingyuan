name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build
        env:
          GITHUB_PAGES: "1"
          # 高德地图 key（公开）
          NEXT_PUBLIC_GAODE_KEY: ${{ secrets.NEXT_PUBLIC_GAODE_KEY }}
          # LLM API 配置（静态托管模式下客户端直连必需）
          NEXT_PUBLIC_IFLOW_API_KEY: ${{ secrets.NEXT_PUBLIC_IFLOW_API_KEY }}
          NEXT_PUBLIC_IFLOW_API_URL: ${{ secrets.NEXT_PUBLIC_IFLOW_API_URL || 'https://apis.iflow.cn/v1' }}
          NEXT_PUBLIC_IFLOW_MODEL: ${{ secrets.NEXT_PUBLIC_IFLOW_MODEL || 'qwen3-vl-plus' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
